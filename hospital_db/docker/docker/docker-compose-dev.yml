services:
  hospital-db:
    image: postgres:15-alpine
    container_name: hospital_postgres_dev
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - hospital_data_dev:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  hospital_data_dev:
    driver: local