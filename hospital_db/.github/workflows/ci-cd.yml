name: CI/CD Hospital DB

on:
  push:
    branches: [ develop, qa, main ]
  pull_request:
    branches: [ develop, qa, main ]

jobs:
  ci-liquibase:
    name: CI - Validar Liquibase
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hospital_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Liquibase
        run: |
          wget -q https://github.com/liquibase/liquibase/releases/download/v4.26.0/liquibase-4.26.0.tar.gz
          tar -xzf liquibase-4.26.0.tar.gz
          sudo mv liquibase /usr/local/bin/
          liquibase --version

      - name: Ejecutar migraciones Liquibase
        run: |
          liquibase \
            --url=jdbc:postgresql://localhost:5433/hospital_db \
            --username=postgres \
            --password=postgres \
            --changeLogFile=liquibase/changelog-master.yaml \
            update

      - name: Validar migraciones
        run: |
          liquibase \
            --url=jdbc:postgresql://localhost:5433/hospital_db \
            --username=postgres \
            --password=postgres \
            --changeLogFile=liquibase/changelog-master.yaml \
            validate

  ci-sql-check:
    name: CI - Verificar estructura SQL
    runs-on: ubuntu-latest
    needs: ci-liquibase

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Verificar archivos SQL existen
        run: |
          echo "Verificando estructura de módulos..."
          test -f 01_ddl/gestion_usuarios/03_tables/001_table_patients.sql && echo "✅ patients.sql existe"
          test -f 01_ddl/gestion_medica/03_tables/001_table_doctors.sql && echo "✅ doctors.sql existe"
          test -f 01_ddl/gestion_cita/03_tables/001_table_appointments.sql && echo "✅ appointments.sql existe"
          test -f 02_dml/00_inserts/gestion_usuarios/001_insert_patients.sql && echo "✅ insert_patients.sql existe"
          test -f 02_dml/00_inserts/gestion_medica/001_insert_doctors.sql && echo "✅ insert_doctors.sql existe"
          test -f 02_dml/00_inserts/gestion_cita/001_insert_appointments.sql && echo "✅ insert_appointments.sql existe"

  cd-docker:
    name: CD - Build Docker BD
    runs-on: ubuntu-latest
    needs: [ ci-liquibase, ci-sql-check ]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Build imagen Docker
        run: docker build -t hospital-db:latest ./docker

      - name: Verificar contenedor BD
        run: |
          docker run -d --name hospital-db-test \
            -e POSTGRES_DB=hospital_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5433:5432 \
            hospital-db:latest
          sleep 15
          docker ps
          docker stop hospital-db-test || true
          docker rm hospital-db-test || true